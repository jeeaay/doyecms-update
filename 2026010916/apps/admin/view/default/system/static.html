{include file='common/head.html'}

<div class="layui-body">
    <div class="layui-tab layui-tab-brief" lay-filter="tab">
      <ul class="layui-tab-title">
        <li class="layui-this" lay-id="t1">静态生成管理</li>
      </ul>
      <div class="layui-tab-content">
           <div class="layui-tab-item layui-show">
               
               <blockquote class="layui-elem-quote">
                   上次生成时间：<span id="last-generate-time">-</span> &nbsp;|&nbsp; 
                   耗时：<span id="last-duration">-</span> &nbsp;|&nbsp; 
                   状态：<span id="last-status">-</span>
               </blockquote>

               <fieldset class="layui-elem-field layui-field-title" style="margin-top: 20px;">
                   <legend>操作区域</legend>
               </fieldset>
               
               <input type="hidden" id="formcheck" value="{$formcheck}">
               
               <div class="layui-form-item">
                   <div class="layui-input-block" style="margin-left: 0;">
                       <button class="layui-btn" id="btn-generate-all">全站生成</button>
                       <button class="layui-btn layui-btn-warm" id="btn-generate-home">仅生成首页</button>
                       <button class="layui-btn layui-btn-normal" id="btn-generate-sort" style="display:none;">按栏目生成</button>
                       <button class="layui-btn layui-btn-danger" id="btn-generate-content" style="display:none;">按内容生成</button>
                   </div>
               </div>

               <div class="layui-form-item">
                   <div class="layui-input-block" style="margin-left: 0;">
                       <div class="layui-progress layui-progress-big" lay-filter="static-progress" lay-showpercent="true">
                           <div class="layui-progress-bar" lay-percent="0%"></div>
                       </div>
                       <div style="margin-top: 8px;">
                           进度：<span id="progress-text">0/0</span> &nbsp;|&nbsp;
                           失败：<span id="progress-fail">0</span>
                       </div>
                   </div>
               </div>

               <fieldset class="layui-elem-field layui-field-title" style="margin-top: 20px;">
                   <legend>生成日志</legend>
               </fieldset>
               
               <div class="console-box" style="background: #333; color: #fff; padding: 10px; height: 300px; overflow-y: scroll; font-family: Consolas, Monaco, monospace;">
                   <div id="console-log">准备就绪...</div>
               </div>
               
           </div>
      </div>
    </div>
</div>
{include file='common/foot.html'}

<script>
layui.use(['layer', 'jquery', 'element'], function(){
  var layer = layui.layer;
  var $ = layui.jquery;
  var element = layui.element;

  var STORAGE_KEY = 'doyecms_static_generate_state';
  var isRunning = false;
  var MAX_LOG = 200;
  var BATCH_SIZE = 20;
  var PLAN_PAGE_SIZE = 200;

  function loadState() {
      try {
          var raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return null;
          return JSON.parse(raw);
      } catch (e) {
          return null;
      }
  }

  function saveState(state) {
      try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch (e) {}
  }

  function defaultState() {
      return {
          total: 0,
          done: 0,
          fail: 0,
          cursor: 0,
          has_more: true,
          queue: [],
          started_at: null
      };
  }

  function appendLog(html) {
      var $log = $('#console-log');
      $log.prepend('<div>' + html + '</div>');
      var children = $log.children();
      if (children.length > MAX_LOG) {
          children.slice(MAX_LOG).remove();
      }
  }

  function updateProgress(state) {
      var total = parseInt(state.total) || 0;
      var done = parseInt(state.done) || 0;
      var percent = total > 0 ? Math.floor((done / total) * 100) : 0;
      if (percent > 100) percent = 100;
      
      // 调试日志，帮助排查问题
      // console.log('Progress:', done, total, percent);
      
      element.progress('static-progress', percent + '%');
      $('#progress-text').text('已处理: ' + done + ' / ' + total);
      $('#progress-fail').text(state.fail || 0);
  }

  function requestPlan(cursor, limit) {
      return $.ajax({
          type: 'GET',
          url: '{url./admin/Static/plan}',
          dataType: 'json',
          data: { cursor: cursor, limit: limit }
      });
  }

  function requestBatch(items) {
      return $.ajax({
          type: 'POST',
          url: '{url./admin/Static/generateBatch}',
          dataType: 'json',
          data: { 
              items: JSON.stringify(items),
              formcheck: $('#formcheck').val()
          }
      });
  }

  function ensureQueue(state) {
      if (state.queue && state.queue.length > 0) {
          return $.Deferred().resolve(state).promise();
      }
      // if (!state.has_more && state.cursor >= state.total) { // 旧逻辑：依赖总数
      if (state.has_more === false) { // 新逻辑：明确标记没有更多
          return $.Deferred().resolve(state).promise();
      }
      return requestPlan(state.cursor || 0, PLAN_PAGE_SIZE).then(function(res){
          if (res.code != 1) {
              return $.Deferred().reject(res.data || '获取生成清单失败').promise();
          }
          var data = res.data || {};
          if (data.total !== undefined && data.total > -1) {
              state.total = parseInt(data.total);
              appendLog('任务总数：' + state.total);
          }
          state.cursor = data.next_cursor || 0;
          state.has_more = !!data.has_more;
          state.queue = (data.items || []).concat(state.queue || []);
          saveState(state);
          updateProgress(state);
          appendLog('已加载清单：' + (data.items || []).length + ' 条');
          return state;
      });
  }

  function processNextBatch() {
      if (!isRunning) return;
      var state = loadState() || defaultState();
      ensureQueue(state).then(function(nextState){
          if (!isRunning) return;
          if (!nextState.queue || nextState.queue.length === 0) {
              isRunning = false;
              appendLog('<span style="color:#5FB878;">生成完成</span>');
              $('#last-status').text('完成');
              if (nextState.started_at) {
                  var duration = Math.floor((Date.now() - nextState.started_at) / 1000);
                  $('#last-duration').text(duration + 's');
              }
              $('#last-generate-time').text(new Date().toLocaleString());
              
              // 自动重置进度，方便下次直接生成
              resetGenerate();
              return;
          }

          var batch = nextState.queue.splice(0, BATCH_SIZE);
          saveState(nextState);
          requestBatch(batch).then(function(res){
              if (res.code != 1) {
                  nextState.fail += batch.length;
                  nextState.done += batch.length;
                  appendLog('<span style="color:#FF5722;">批次失败：</span>' + (res.data || '未知错误'));
              } else {
                  var data = res.data || {};
                  nextState.done += (data.success || 0) + (data.fail || 0);
                  nextState.fail += (data.fail || 0);
                  if (data.errors && data.errors.length) {
                      for (var i = 0; i < data.errors.length; i++) {
                          appendLog('<span style="color:#FF5722;">失败：</span>' + (data.errors[i].error || ''));
                      }
                  }
                  appendLog('<span style="color:#5FB878;">批次完成</span> 成功 ' + (data.success || 0) + '，失败 ' + (data.fail || 0));
              }
              saveState(nextState);
              updateProgress(nextState);
              setTimeout(processNextBatch, 50);
          }).fail(function(xhr, status, error){
              nextState.fail += batch.length;
              nextState.done += batch.length;
              saveState(nextState);
              updateProgress(nextState);
              appendLog('<span style="color:#FF5722;">请求失败：</span>' + (error || status));
              setTimeout(processNextBatch, 300);
          });
      }).fail(function(msg){
          isRunning = false;
          appendLog('<span style="color:#FF5722;">停止：</span>' + msg);
          $('#last-status').text('失败');
      });
  }

  function startGenerate() {
      if (isRunning) return;
      isRunning = true;
      var state = loadState() || defaultState();
      if (!state.started_at) {
          state.started_at = Date.now();
      }
      saveState(state);
      $('#last-status').text('进行中');
      processNextBatch();
  }

  function stopGenerate() {
      isRunning = false;
      appendLog('已停止');
      $('#last-status').text('已停止');
  }

  function resetGenerate() {
      isRunning = false;
      localStorage.removeItem(STORAGE_KEY);
      // updateProgress(defaultState()); // 生成完成后不重置进度条显示，保留最终结果
      // appendLog('已重置进度'); // 生成完成后不显示重置日志
      // $('#last-status').text('-'); // 生成完成后不重置状态显示
      // $('#last-duration').text('-'); // 生成完成后不重置耗时显示
      // $('#last-generate-time').text('-'); // 生成完成后不重置时间显示
  }

  $('#btn-generate-all').click(function(){
      startGenerate();
  });

  /*
  $('#btn-stop-generate').click(function(){
      stopGenerate();
  });

  $('#btn-reset-generate').click(function(){
      layer.confirm('确认重置进度？这不会删除已生成文件。', function(idx){
          layer.close(idx);
          resetGenerate();
      });
  });
  */

  $('#btn-generate-home').click(function(){
      var btn = $(this);
      btn.addClass('layui-btn-disabled').prop('disabled', true).text('生成中...');
      
      requestBatch([{type: 'index'}]).then(function(res){
          if (res.code == 1) {
              layer.msg('首页生成成功', {icon: 1});
              appendLog('<span style="color:#5FB878;">首页生成成功</span>');
              $('#last-status').text('完成');
              $('#last-generate-time').text(new Date().toLocaleString());
          } else {
              layer.alert('生成失败：' + (res.data || '未知错误'), {icon: 2});
              appendLog('<span style="color:#FF5722;">首页生成失败：</span>' + (res.data || ''));
          }
      }).fail(function(){
          layer.alert('请求失败，请检查网络或日志', {icon: 2});
          appendLog('<span style="color:#FF5722;">请求失败</span>');
      }).always(function(){
          btn.removeClass('layui-btn-disabled').prop('disabled', false).text('仅生成首页');
      });
  });

  var initState = loadState();
  if (initState) {
      updateProgress(initState);
      $('#last-status').text('可继续');
      appendLog('检测到未完成任务，可点击“生成全站（分批）”继续');
  } else {
      updateProgress(defaultState());
  }
});
</script>
